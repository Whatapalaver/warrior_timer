inherit_gem:
  rubocop-rails-omakase: rubocop.yml

require:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.1
  NewCops: enable
  Exclude:
    - "db/schema.rb"
    - "bin/**/*"
    - "node_modules/**/*"
    - "vendor/**/*"

# ViewComponent initialize methods don't need to call super unless using slots.
# The parent class accepts arbitrary args and the warning is noise here.
Lint/MissingSuper:
  Exclude:
    - "app/components/**/*"

# System/integration tests legitimately need longer examples and multiple expectations.
RSpec/ExampleLength:
  Max: 20
  Exclude:
    - "spec/system/**/*"

RSpec/MultipleExpectations:
  Max: 10
  Exclude:
    - "spec/system/**/*"
